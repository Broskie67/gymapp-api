services:
  backend:
    env_file:
      - .env.docker
    build: .
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      HOST: 0.0.0.0
      PORT: 3000
      URL: http://localhost
      SA_USER: ${SA_USER}
      SA_PASSWORD: ${SA_PASSWORD}
      SQLSERVER_SERVER: ${SQLSERVER_SERVER}
      SQLSERVER_DATABASE: ${SQLSERVER_DATABASE}
      SQLSERVER_PORT: ${SQLSERVER_PORT}
    depends_on:
      - sqlserver
      - db-init

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    ports:
      - "14330:1433"
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: ${SA_PASSWORD}
    volumes:
      - sqlserver-data:/var/opt/mssql

  db-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    env_file:
      - .env.docker
    depends_on:
      - sqlserver
    volumes:
      - ./db:/db
    entrypoint: /bin/bash
    command: -c "until /opt/mssql-tools18/bin/sqlcmd -S sqlserver -U sa -P \"$SA_PASSWORD\" -C -Q 'SELECT 1' > /dev/null 2>&1; do sleep 2; done; /opt/mssql-tools18/bin/sqlcmd -S sqlserver -U sa -P \"$SA_PASSWORD\" -C -i /db/init.sql"

volumes:
  sqlserver-data:


      